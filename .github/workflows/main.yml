name: Windows RDP
on:
  workflow_dispatch:
    inputs:
      Windows-latest:
        description: 'Windows latest'
        type: boolean
        default: true
      Windows-2025:
        description: 'Windows 2025'
        type: boolean
        default: false

jobs:
  Get-EasyTier-Version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.Get-EasyTier-Version.outputs.version }}
    steps:
      - name: Get EasyTier Latest Version
        id: Get-EasyTier-Version
        run: |
          version=`wget --spider -S https://github.com/EasyTier/EasyTier/releases/latest 2>&1 | grep -m1 '^  Location:' | sed 's,.*/tag/v,,'`
          echo "version=$version" >> $GITHUB_OUTPUT
 
  Windows-latest:
    runs-on: windows-latest
    if: ${{ github.event.inputs.Windows-latest == 'true' }}
    needs: Get-EasyTier-Version
    steps:
      - name: Download and Extract EasyTier
        env:
          version: ${{needs.Get-EasyTier-Version.outputs.version}}
        run: |
          Invoke-WebRequest https://github.com/EasyTier/EasyTier/releases/download/v${{ env.version }}/easytier-windows-x86_64-v${{ env.version }}.zip -OutFile EasyTier.zip
          Expand-Archive -Path EasyTier.zip -DestinationPath .\EasyTier -Force
          Remove-Item -Path "EasyTier.zip"

      - name: Configure Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set Administrator Password
        run: |
          $securePassword = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $securePassword
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}

      - name: Start EasyTier Tunnel
        continue-on-error: true
        run: |
          .\EasyTier\easytier-windows-x86_64\easytier-core.exe `
            --hostname "GithubActions-Runner" `
            --instance-name "GithubActions-Runner" `
            --dhcp `
            --listeners "tcp://0.0.0.0:11010" `
            --listeners "udp://0.0.0.0:11010" `
            --rpc-portal "0.0.0.0:15888" `
            --network-name "${{ secrets.EASYTIER_NETWORK_NAME }}" `
            --network-secret "${{ secrets.EASYTIER_NETWORK_SECRET }}" `
            --peers "tcp://public.easytier.top:11010" `
            --default-protocol "tcp" `
            --latency-first `
            --multi-thread `
            --bind-device true `
            --enable-kcp-proxy `
            --enable-quic-proxy `
            --encryption-algorithm aes-gcm `
            --compression zstd
        env:
          EASYTIER_NETWORK_NAME: ${{ secrets.EASYTIER_NETWORK_NAME }}
          EASYTIER_NETWORK_SECRET: ${{ secrets.EASYTIER_NETWORK_SECRET }}

      - name: Delete old workflow run
        uses: Mattraks/delete-workflow-runs@main
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}

  Windows-2025:
    runs-on: windows-2025
    if: ${{ github.event.inputs.Windows-2025 == 'true' }}
    needs: Get-EasyTier-Version
    steps:
      - name: Download and Extract EasyTier
        env:
          version: ${{needs.Get-EasyTier-Version.outputs.version}}
        run: |
          Invoke-WebRequest https://github.com/EasyTier/EasyTier/releases/download/v${{ env.version }}/easytier-windows-x86_64-v${{ env.version }}.zip -OutFile EasyTier.zip
          Expand-Archive -Path EasyTier.zip -DestinationPath .\EasyTier -Force
          Remove-Item -Path "EasyTier.zip"

      - name: Configure Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set Administrator Password
        run: |
          $securePassword = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $securePassword
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}

      - name: Start EasyTier Tunnel
        continue-on-error: true
        run: |
          .\EasyTier\easytier-windows-x86_64\easytier-core.exe `
            --hostname "GithubActions-Runner" `
            --instance-name "GithubActions-Runner" `
            --dhcp `
            --listeners "tcp://0.0.0.0:11010" `
            --listeners "udp://0.0.0.0:11010" `
            --rpc-portal "0.0.0.0:15888" `
            --network-name "${{ secrets.EASYTIER_NETWORK_NAME }}" `
            --network-secret "${{ secrets.EASYTIER_NETWORK_SECRET }}" `
            --peers "tcp://public.easytier.top:11010" `
            --default-protocol "tcp" `
            --latency-first `
            --multi-thread `
            --bind-device true `
            --enable-kcp-proxy `
            --enable-quic-proxy `
            --encryption-algorithm aes-gcm `
            --compression zstd
        env:
          EASYTIER_NETWORK_NAME: ${{ secrets.EASYTIER_NETWORK_NAME }}
          EASYTIER_NETWORK_SECRET: ${{ secrets.EASYTIER_NETWORK_SECRET }}

      - name: Delete old workflow run
        uses: Mattraks/delete-workflow-runs@main
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
