name: Windows RDP
on:
  workflow_dispatch:
    inputs:
      Windows-Runners:
        description: 'Comma-separated Windows runner labels'
        required: true
        default: 'windows-latest'

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      easytier_version: ${{ steps.get-easytier-version.outputs.version }}
      matrix: ${{ steps.build-runner-matrix.outputs.matrix }}
      has-runners: ${{ steps.build-runner-matrix.outputs.has-runners }}
    steps:
      - name: Get EasyTier Latest Version
        id: get-easytier-version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name=$(gh release list -R EasyTier/EasyTier --limit 1 --json tagName --jq '.[0].tagName')
          version=$(printf '%s' "$tag_name" | sed -E 's/^v//')

          if [ -z "$version" ]; then
            echo "Failed to resolve EasyTier release version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build Windows Runner Matrix
        id: build-runner-matrix
        shell: bash
        env:
          WINDOWS_RUNNERS: ${{ github.event.inputs['Windows-Runners'] }}
        run: |
          matrix='{"include":['
          separator=''

          while IFS= read -r runner; do
            runner=$(printf '%s' "$runner" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
            [ -n "$runner" ] || continue

            escaped_runner=$(printf '%s' "$runner" | sed 's/\\/\\\\/g; s/"/\\"/g')
            matrix="${matrix}${separator}{\"name\":\"${escaped_runner}\",\"runner\":\"${escaped_runner}\"}"
            separator=','
          done <<EOF
          $(printf '%s' "$WINDOWS_RUNNERS" | tr ',' '\n')
          EOF

          if [ -n "$separator" ]; then
            matrix="${matrix}]}"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "has-runners=true" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "has-runners=false" >> "$GITHUB_OUTPUT"
          fi

  Windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    if: ${{ needs.Prepare.outputs.has-runners == 'true' }}
    needs: Prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Prepare.outputs.matrix) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@main

      - name: Download and Extract EasyTier
        env:
          easytier_version: ${{ needs.Prepare.outputs.easytier_version }}
        run: |
          Invoke-WebRequest https://github.com/EasyTier/EasyTier/releases/download/v${{ env.easytier_version }}/easytier-windows-x86_64-v${{ env.easytier_version }}.zip -OutFile EasyTier.zip
          Expand-Archive -Path EasyTier.zip -DestinationPath .\EasyTier -Force
          Remove-Item -Path "EasyTier.zip"

      - name: Configure Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set Administrator Password
        run: |
          $securePassword = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $securePassword
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}

      - name: Start EasyTier Tunnel
        continue-on-error: true
        shell: pwsh
        run: |
          $configPath = Join-Path $env:GITHUB_WORKSPACE 'EastTier\Config\Github-Actions.toml'

          if (-not (Test-Path -LiteralPath $configPath)) {
            throw "EasyTier config not found: $configPath"
          }

          function Redact-IpAddress([string]$line) {
            if ($null -eq $line) {
              return ''
            }

            $line = [regex]::Replace($line, '(?<!\d)(?:\d{1,3}\.){3}\d{1,3}(?!\d)', '[PRIVACY]')
            $line = [regex]::Replace($line, '(?i)(?<![0-9a-f:])(?:[0-9a-f]{1,4}:){2,7}[0-9a-f]{1,4}(?![0-9a-f:])', '[PRIVACY]')
            return $line
          }

          & .\EasyTier\easytier-windows-x86_64\easytier-core.exe `
            -c "$configPath" `
            --network-name "${{ secrets.EASYTIER_NETWORK_NAME }}" `
            --network-secret "${{ secrets.EASYTIER_NETWORK_SECRET }}" 2>&1 |
            ForEach-Object {
              Write-Host (Redact-IpAddress $_.ToString())
            }

          if ($LASTEXITCODE -ne 0) {
            throw "EasyTier exited with code $LASTEXITCODE"
          }
        env:
          EASYTIER_NETWORK_NAME: ${{ secrets.EASYTIER_NETWORK_NAME }}
          EASYTIER_NETWORK_SECRET: ${{ secrets.EASYTIER_NETWORK_SECRET }}

  Finalize:
    name: Finalize Workflow
    needs: Windows
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
